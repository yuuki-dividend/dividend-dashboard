<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e3a5f"/>
    </linearGradient>
    <linearGradient id="coinGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="graphGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <!-- Coin -->
  <circle cx="192" cy="192" r="107" fill="url(#coinGrad)" opacity="0.95"/>
  <circle cx="192" cy="192" r="88" fill="none" stroke="#fde68a" stroke-width="5" opacity="0.6"/>
  <text x="192" y="194" text-anchor="middle" dominant-baseline="central" font-family="system-ui, -apple-system, sans-serif" font-size="107" font-weight="800" fill="#78350f">¥</text>
  <!-- Growth chart bars -->
  <rect x="299" y="341" width="37" height="59" rx="6" fill="url(#graphGrad)" opacity="0.7"/>
  <rect x="347" y="309" width="37" height="91" rx="6" fill="url(#graphGrad)" opacity="0.8"/>
  <rect x="395" y="267" width="37" height="133" rx="6" fill="url(#graphGrad)" opacity="0.9"/>
  <rect x="443" y="219" width="37" height="181" rx="6" fill="url(#graphGrad)" opacity="1"/>
  <!-- Growth arrow -->
  <polyline points="316,331 362,299 410,259 460,211" fill="none" stroke="#34d399" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <polygon points="460,211 460,237 434,211" fill="#34d399"/>
  <!-- Small coins -->
  <circle cx="75" cy="373" r="27" fill="url(#coinGrad)" opacity="0.5"/>
  <text x="75" y="375" text-anchor="middle" dominant-baseline="central" font-family="system-ui, sans-serif" font-size="29" font-weight="700" fill="#78350f">¥</text>
  <circle cx="139" cy="421" r="21" fill="url(#coinGrad)" opacity="0.4"/>
  <text x="139" y="423" text-anchor="middle" dominant-baseline="central" font-family="system-ui, sans-serif" font-size="24" font-weight="700" fill="#78350f">¥</text>
  <circle cx="213" cy="395" r="24" fill="url(#coinGrad)" opacity="0.45"/>
  <text x="213" y="397" text-anchor="middle" dominant-baseline="central" font-family="system-ui, sans-serif" font-size="26" font-weight="700" fill="#78350f">¥</text>
</svg>
