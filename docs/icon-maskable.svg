<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e3a5f"/>
    </linearGradient>
    <linearGradient id="coinGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="graphGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
  </defs>
  <!-- Maskable: full bleed background, content in safe zone (inner 80% = 51-461) -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- Coin -->
  <circle cx="210" cy="200" r="85" fill="url(#coinGrad)" opacity="0.95"/>
  <circle cx="210" cy="200" r="70" fill="none" stroke="#fde68a" stroke-width="4" opacity="0.6"/>
  <text x="210" y="202" text-anchor="middle" dominant-baseline="central" font-family="system-ui, -apple-system, sans-serif" font-size="85" font-weight="800" fill="#78350f">¥</text>
  <!-- Growth chart bars -->
  <rect x="290" y="320" width="30" height="48" rx="5" fill="url(#graphGrad)" opacity="0.7"/>
  <rect x="328" y="294" width="30" height="74" rx="5" fill="url(#graphGrad)" opacity="0.8"/>
  <rect x="366" y="262" width="30" height="106" rx="5" fill="url(#graphGrad)" opacity="0.9"/>
  <rect x="404" y="226" width="30" height="142" rx="5" fill="url(#graphGrad)" opacity="1"/>
  <!-- Growth arrow -->
  <polyline points="304,312 342,286 380,254 418,220" fill="none" stroke="#34d399" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <polygon points="418,220 418,240 398,220" fill="#34d399"/>
  <!-- Small coins -->
  <circle cx="108" cy="350" r="22" fill="url(#coinGrad)" opacity="0.5"/>
  <text x="108" y="352" text-anchor="middle" dominant-baseline="central" font-family="system-ui, sans-serif" font-size="24" font-weight="700" fill="#78350f">¥</text>
  <circle cx="160" cy="390" r="17" fill="url(#coinGrad)" opacity="0.4"/>
  <text x="160" y="392" text-anchor="middle" dominant-baseline="central" font-family="system-ui, sans-serif" font-size="19" font-weight="700" fill="#78350f">¥</text>
</svg>
